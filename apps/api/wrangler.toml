# Cloudflare Worker config for the Central Command API.
#
# Resource IDs (D1, KV) are committed here — they are identifiers, not secrets.
#
# Secrets are NOT stored here. Set them with `wrangler secret put <NAME>` for
# production, and in an untracked `.dev.vars` file for local dev
# (see .dev.vars.example):
#   API_BEARER_TOKEN, OPENWEATHERMAP_API_KEY, RIOT_API_KEY, RIOT_DEV_RIOT_ID,
#   GOOGLE_OAUTH_CLIENT_ID, GOOGLE_OAUTH_CLIENT_SECRET, TOKEN_ENCRYPTION_KEY

name = "centralcommand"
main = "src/index.ts"
compatibility_date = "2025-06-01"

[observability]
enabled = true

# Bind the Worker to the API path on the production hostname. Pages serves the
# SPA at the root; this more-specific /api/* route takes precedence for API
# traffic. The OAuth callback URL is derived from the request origin, so it
# resolves to https://centralcommand.studiosc.dev/api/auth/google/callback.
[[routes]]
pattern = "centralcommand.studiosc.dev/api/*"
zone_name = "studiosc.dev"

[[d1_databases]]
binding = "DB"
database_name = "central-command-db"
database_id = "ac9fe7af-f080-4ced-bc1e-66d996cf5c22"
migrations_dir = "../../packages/db/migrations"

[[kv_namespaces]]
binding = "CACHE"
id = "371f6b05b8f74a369d4053ed0b50345e"

# Non-secret config. Public origin of the app, used to build the Google Calendar
# push webhook address (centralcommand.studiosc.dev/api/calendar/notifications).
# For local `wrangler dev`, override this to an empty string in `.dev.vars` so
# calendar push self-disables (Google can't reach localhost); the poll keeps
# data fresh regardless.
[vars]
APP_ORIGIN = "https://centralcommand.studiosc.dev"

# Scheduled jobs. Each tick runs BOTH the Riot refresh and the Google Calendar
# push-channel renewal (channels expire ≤7 days; renewed within 24h of expiry,
# so twice daily is ample). Cron Triggers fire in UTC only — the Riot "8am/8pm
# local" rule from CLAUDE.md is enforced per-user in code. These two UTC times
# are a placeholder cadence; tighten once a timezone strategy is wired up.
[triggers]
crons = ["0 8 * * *", "0 20 * * *"]
